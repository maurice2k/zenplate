name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4', '8.5']
    steps:
      - uses: actions/checkout@v4

      - name: Build test image
        run: docker build --build-arg PHP_VERSION=${{ matrix.php }} -t zenplate-test:${{ matrix.php }} -f tests/Dockerfile .

      - name: Run tests
        run: docker run --rm zenplate-test:${{ matrix.php }}
